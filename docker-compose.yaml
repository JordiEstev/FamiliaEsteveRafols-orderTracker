version: "3.9"

services:
  backend:
    build: ./backend
    container_name: fruit-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env          # carga DATABASE_URL y CORS_ORIGINS
    volumes:
      - ./data:/app/data        # monta el directorio, no el archivo
    restart: unless-stopped