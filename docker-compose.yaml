version: "3.9"

services:
  backend:
    build: ./backend
    container_name: fruit-backend
    ports:
      - "8000:8000"
    volumes:               # keep SQLite file on host for easy backup
      - ./backend/database.db:/app/database.db
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: fruit-frontend
    ports:
      - "5173:80"          # 5173 outside → 80 in Nginx container
    depends_on:
      - backend
    restart: unless-stopped
